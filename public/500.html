<!doctype html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <title>Busy Bee | Something went wrong</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0fffe;
        font-family: system-ui, sans-serif;
        color: #154f4d;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        max-width: 520px;
        border: 1px solid #ccfbf8;
      }
      h1 {
        font-size: 4rem;
        margin: 0;
        color: #0d7f7a;
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.85rem 1.25rem;
        background: #00b8b0;
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
      }
      a:hover {
        background: #009e97;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>500</h1>
      <h2>The hive is temporarily busy</h2>
      <p>Something went wrong on our side. Please try again soon.</p>
      <a href="/">Back to Busy Bee</a>
    </div>

</html>
